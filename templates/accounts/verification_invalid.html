{% extends "base.html" %}
{% block title %}Ligação inválida | CVLink{% endblock %}
{% block content %}<main class="form-page"><div class="container narrow-container"><div class="auth-card"><h1>Ligação indisponível</h1><p>Esta ligação é inválida, expirou ou já foi utilizada.</p>{% if request.user.is_authenticated %}<form method="post" action="{% url 'accounts:resend-verification' %}">{% csrf_token %}<button class="btn btn-brand" type="submit">Enviar nova ligação</button></form>{% else %}<a class="btn btn-brand" href="{% url 'accounts:login' %}">Iniciar sessão</a>{% endif %}</div></div></main>{% endblock %}
